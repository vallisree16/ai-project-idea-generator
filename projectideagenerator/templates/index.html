<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaForge – AI Project Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0f;--card:#1a1a26;--border:#2a2a3d;
      --accent:#7c5cfc;--accent2:#00d4aa;
      --text:#e8e8f0;--muted:#6b6b85;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .hero{text-align:center;padding:2rem 1.5rem;max-width:640px;}
    .badge{display:inline-block;background:rgba(124,92,252,0.15);color:var(--accent);border:1px solid rgba(124,92,252,0.3);padding:.3rem .9rem;border-radius:99px;font-size:.8rem;font-weight:600;letter-spacing:.5px;margin-bottom:1.8rem;}
    h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.2rem,5vw,3.4rem);font-weight:700;line-height:1.15;margin-bottom:1.2rem;}
    h1 span{color:var(--accent);}
    .sub{color:var(--muted);font-size:1.05rem;line-height:1.7;margin-bottom:2.5rem;}
    .cta{display:inline-flex;align-items:center;gap:.6rem;background:var(--accent);color:#fff;padding:.85rem 2rem;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;text-decoration:none;transition:opacity .2s,transform .1s;}
    .cta:hover{opacity:.88;}
    .cta:active{transform:scale(.98);}
    .arrow{font-size:1.1rem;}
    .stats{display:flex;gap:2rem;justify-content:center;margin-top:3rem;flex-wrap:wrap;}
    .stat{text-align:center;}
    .stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent2);}
    .stat-label{font-size:.78rem;color:var(--muted);margin-top:.2rem;}
  </style>
</head>
<body>
  <div class="hero">
    <div class="badge">⚡ Powered by Claude AI</div>
    <h1>Turn Your Skills Into <span>Winning Projects</span></h1>
    <p class="sub">Enter your profession and get AI-generated project ideas tailored to your experience level — perfect for your portfolio.</p>
    <a href="/form" class="cta">Get Started <span class="arrow">→</span></a>
    <div class="stats">
      <div class="stat"><div class="stat-num">50+</div><div class="stat-label">Professions</div></div>
      <div class="stat"><div class="stat-num">AI</div><div class="stat-label">Powered Ideas</div></div>
      <div class="stat"><div class="stat-num">Free</div><div class="stat-label">Always</div></div>
    </div>
  </div>
</body>
</html>
